name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable Corepack and install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Check UTF-8 BOM
        run: pnpm run strip:bom:check

      - name: Install Playwright Browsers
        run: pnpm run playwright:install

      - name: Build library and docs for E2E
        run: pnpm run build && pnpm run docs:build

      - name: Run E2E Tests
        run: pnpm run test:e2e
        env:
          CI: true
          E2E_PREBUILT: '1'
